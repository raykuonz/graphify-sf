name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point this feature addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. CLI flags, new metadata type, export format, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or alternative approaches you considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New metadata extractor
        - Export format
        - CLI command
        - LLM backend
        - IDE skill / agent integration
        - Performance
        - Documentation
        - Other
    validations:
      required: true
