name: Release Binaries + npm

# Triggered by the same release event as publish.yml (PyPI).
# This workflow builds PyInstaller binaries for each platform, uploads them to
# the GitHub Release, then publishes the npm wrapper package.
#
# It also supports manual re-runs against an existing tag via workflow_dispatch
# (e.g. to re-build/re-publish after fixing a runner image) without cutting a
# new version.
#
# Required secret: NPM_TOKEN (repo secret → Settings → Secrets and variables → Actions).
# The PyPI publish remains in publish.yml and is not affected by this file.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build binaries + publish npm for (e.g. v0.3.2)"
        required: true
        type: string

permissions:
  contents: write   # needed to upload assets to the release
  id-token: write   # not used here, but harmless

jobs:
  build-binaries:
    name: Build binary (${{ matrix.target-os }}-${{ matrix.target-arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target-os: linux
            target-arch: x64
            asset-name: graphify-sf-linux-x64

          - runner: ubuntu-24.04-arm
            target-os: linux
            target-arch: arm64
            asset-name: graphify-sf-linux-arm64

          - runner: macos-15-intel
            target-os: darwin
            target-arch: x64
            asset-name: graphify-sf-darwin-x64

          - runner: macos-14
            target-os: darwin
            target-arch: arm64
            asset-name: graphify-sf-darwin-arm64

          - runner: windows-latest
            target-os: win32
            target-arch: x64
            asset-name: graphify-sf-win32-x64.exe

    steps:
      # Resolve the target tag from either trigger (release event or manual dispatch).
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${TAG#v}"

      # Check out the exact tagged commit so the build matches the release.
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + PyInstaller
        run: pip install ".[docs]" pyinstaller
        # .[docs] pulls in optional doc extras so they're available if present,
        # but the --exclude-module flags below prevent them entering the bundle.

      - name: Inject version into graphify_sf/_version.py
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          echo "__version__ = \"${VERSION}\"" > graphify_sf/_version.py
          echo "Injected version: ${VERSION}"

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name graphify-sf \
            --collect-submodules graphify_sf \
            --hidden-import graphify_sf.__main__ \
            --exclude-module matplotlib \
            --exclude-module neo4j \
            --exclude-module anthropic \
            --exclude-module openai \
            --exclude-module boto3 \
            --exclude-module mcp \
            --exclude-module watchdog \
            --exclude-module graspologic \
            --exclude-module pypdf \
            --exclude-module docx \
            --exclude-module openpyxl \
            -c \
            graphify_sf/__main__.py

      - name: Rename artifact to release asset name
        shell: bash
        run: |
          SRC="dist/graphify-sf"
          if [ "${{ matrix.target-os }}" = "win32" ]; then
            SRC="dist/graphify-sf.exe"
          fi
          cp "${SRC}" "${{ matrix.asset-name }}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ matrix.asset-name }}" \
            --clobber

  publish-npm:
    name: Publish to npm (platform subpackages + main)
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Pull the binaries that build-binaries just uploaded to the GitHub
      # Release. These are the exact artifacts shipped inside the platform
      # subpackages, so the npm channel and the GitHub-download fallback serve
      # byte-identical binaries.
      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p release-bin
          cd release-bin
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "graphify-sf-*" \
            --clobber
          ls -l

      # Scaffold npm/platforms/<plat>-<arch>/ for every target whose binary is
      # present. --strict fails the job if any of the five is missing, so a
      # partial matrix never ships an incomplete set.
      - name: Scaffold platform subpackages
        run: |
          node npm/scripts/build-subpackages.js \
            --version "${{ steps.tag.outputs.version }}" \
            --bin-dir release-bin \
            --out-dir npm/platforms \
            --strict

      # Subpackages MUST publish before the main package: the main package pins
      # exact subpackage versions in optionalDependencies. Re-running for an
      # already-published version will 403; acceptable on manual re-dispatch
      # (the main publish still proceeds).
      - name: Publish platform subpackages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -e
          for dir in npm/platforms/*/; do
            echo "Publishing ${dir} ..."
            npm publish "${dir}" --access public
          done

      # Stamp the release version into the main package (its version and its
      # optionalDependencies pins) directly via node — idempotent, unlike
      # `npm version` which errors with "Version not changed" when the in-repo
      # version already equals VERSION (it does, bumped in the release PR).
      - name: Stamp version into main package + optionalDependencies
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const p = "npm/package.json";
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            pkg.version = v;
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = v;
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log("main package stamped to", v);
          '

      - name: Publish main package
        run: npm publish ./npm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
