name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions by default; individual jobs may expand as needed
permissions:
  contents: read

jobs:
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (from lock file)
        run: uv sync --extra dev --frozen

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install lint dependencies
        run: uv sync --extra dev --frozen

      - name: Run ruff (linter)
        run: uv run ruff check graphify_sf/ tests/

      - name: Run ruff (formatter check)
        run: uv run ruff format --check graphify_sf/ tests/

  security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run pip-audit
        run: uv run pip-audit --skip-editable
